<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>API Master</title>
    <link rel="stylesheet" href="/static/api/css/core/base.css?v=0.2.2">
<link rel="stylesheet" href="/static/api/css/ui/loader.css?v=0.2.2">
<link rel="stylesheet" href="/static/api/css/ui/modal.css?v=0.2.2">
<link rel="stylesheet" href="/static/api/css/ui/table.css?v=0.2.2">
<link rel="stylesheet" href="/static/api/css/ui/tree.css?v=0.2.2">
<link rel="stylesheet" href="/static/api/css/ui/runner.css?v=0.2.3">
<link rel="stylesheet" href="/static/api/css/ui/analytics.css?v=0.2.2">
<link rel="stylesheet" href="/static/api/css/ui/toast.css?v=0.2.2">
</head>
<body>
<div id="appLoader" class="app-loader-overlay">
    <div class="app-loader-content">
        <div class="app-loader-title">API MASTER</div>
        <div class="app-loader-bar-wrap"><div id="appLoaderFill" class="app-loader-bar-fill"></div></div>
        <div id="appLoaderPct" class="app-loader-pct">0%</div>
        <div id="appLoaderMsg" class="app-loader-msg">Initializing...</div>
    </div>
</div>
<div class="container"><div class="card">
<h1>API Master <div style="display:flex;align-items:center;gap:8px;margin-left:auto"><button id="loginIndicator" title="Auth Status" style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:12px;margin-right:8px;background:rgba(220,53,69,0.1);color:var(--delete);border:none;cursor:pointer"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor"></span>Login</button><button type="button" class="icon-btn" id="infoToggleBtn" title="View API Master Info"></button><button type="button" class="icon-btn" id="storageToggleBtn" title="View Local Storage"></button><button type="button" class="icon-btn" id="analyticsToggleBtn" title="View Analytics"></button><button type="button" class="icon-btn" id="apiInfoCsv" title="Download CSV catalog"></button></div></h1>
<div class="toolbar-search"><input type="text" id="apiInfoSearch" placeholder="Search" style="padding:12px 40px 12px 16px;font-size:15px;background:#1a1d23;width:100%;border:1px solid rgba(255,255,255,.12);color:#e6eef3;border-radius:8px;box-sizing:border-box"><button type="button" id="apiInfoSearchClear" class="clear-api-btn" style="right:12px">×</button></div>
<div class="tag-card">
    <div class="tag-card-header" id="tagCardHeader">
        <span class="tag-card-title">Path Filters <span id="pathFilterTotal" style="font-weight:500;color:var(--muted)"></span></span>
        <span class="tag-toggle-icon collapsed" id="tagToggleIcon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </span>
    </div>
    <div id="apiInfoTags" class="tag-card-body collapsed"></div>
</div>
<div class="test-summary" id="testSummary" style="display:flex;margin-top:16px"></div>
<div class="test-progress" id="testProgress" style="display:none;margin-top:12px;margin-bottom:16px"><span id="testProgressText">0/0</span><div class="test-progress-bar"><div class="test-progress-fill" id="testProgressFill" style="width:0%"></div></div></div>
<div class="card panel-shell">
    <div class="resp-tbl-wrap master-table-wrap">
        <table class="resp-tbl" id="apiInfoTbl"></table>
    </div>
</div>

<script src="/static/api/js/ui/modal_html.js?v=0.2.2"></script>
<script src="/static/api/js/core/vars.js?v=0.2.2"></script>
<script src="/static/api/js/core/ui.js?v=0.2.2"></script>
<script src="/static/api/js/core/events.js?v=0.2.2"></script>
<script src="/static/api/js/core/store.js?v=0.2.2"></script>
<script src="/static/api/js/icons.js?v=0.2.2"></script>
<script src="/static/api/js/ui/icons_init.js?v=0.2.2"></script>
<script src="/static/api/js/ui/toast.js?v=0.2.2"></script>
<script src="/static/api/js/func/util.js?v=0.2.2"></script>
<script src="/static/api/js/func/param.js?v=0.2.2"></script>
<script src="/static/api/js/func/openapi.js?v=0.2.2"></script>
<script src="/static/api/js/ui/loader.js?v=0.2.2"></script>
<script src="/static/api/js/ui/tree.js?v=0.2.2"></script>
<script src="/static/api/js/ui/modal.js?v=0.2.2"></script>
<script src="/static/api/js/ui/table.js?v=0.2.2"></script>
<script src="/static/api/js/ui/analytics.js?v=0.2.2"></script>
<script src="/static/api/js/ui/storage.js?v=0.2.2"></script>
<script src="/static/api/js/ui/runner.js?v=0.2.2"></script>
<script src="/static/api/js/func/api.js?v=0.2.2"></script>
<script src="/static/api/js/func/ws.js?v=0.2.2"></script>
<script src="/static/api/js/core/init.js?v=0.2.2"></script>
<script>init();</script>
</body>
</html>
